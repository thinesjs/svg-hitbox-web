name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Select version bump type"
        required: true
        default: "automatic"
        type: choice
        options:
          - automatic
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      released: ${{ steps.check-release.outputs.released }}
      version: ${{ steps.extract-version.outputs.version }}
      tag: ${{ steps.extract-version.outputs.tag }}
    concurrency:
      group: ${{ github.workflow }}-release
      cancel-in-progress: false

    steps:
      - name: Check if branch is master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Ref is not master, you must run this action from master branch."
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Release (automatic)
        if: github.event.inputs.force == 'automatic'
        run: pnpm run release:prod

      - name: Run Release
        if: github.event.inputs.force != 'automatic'
        run: pnpm run release:prod --release-as ${{ github.event.inputs.force }}

      - name: Check if release was created
        id: check-release
        run: |
          if git diff --quiet HEAD@{1} HEAD 2>/dev/null; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No changes to release"
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "Release created successfully"
          fi

      - name: Extract version and tag
        id: extract-version
        if: steps.check-release.outputs.released == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Released version: ${VERSION}"
          echo "Released tag: ${TAG}"

      - name: Push changes and tags
        if: steps.check-release.outputs.released == 'true'
        run: |
          git push --follow-tags origin master

      - name: Create Release
        if: steps.check-release.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract-version.outputs.tag }}
          name: ${{ steps.extract-version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-image:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      packages: write
    with:
      ref: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
      environment: production
      build_env: prod
