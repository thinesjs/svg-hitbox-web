name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Select version bump type"
        required: true
        default: "automatic"
        type: choice
        options:
          - automatic
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: ${{ github.workflow }}-release
      cancel-in-progress: false

    outputs:
      released: ${{ steps.check-release.outputs.released }}
      version: ${{ steps.extract-version.outputs.version }}
      tag: ${{ steps.extract-version.outputs.tag }}

    steps:
      - name: Check if branch is master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Ref is not master, you must run this action from master branch."
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Cache global node modules
        id: cache-node-modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 5
          command: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Release (automatic)
        if: github.event.inputs.force == 'automatic'
        run: pnpm run release:prod

      - name: Run Release
        if: github.event.inputs.force != 'automatic'
        run: pnpm run release:prod --release-as ${{ github.event.inputs.force }}

      - name: Check if release was created
        id: check-release
        run: |
          # Check if there are new commits/tags created
          if git diff --quiet HEAD@{1} HEAD 2>/dev/null; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No changes to release"
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "Release created successfully"
          fi

      - name: Extract version and tag
        id: extract-version
        if: steps.check-release.outputs.released == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Released version: ${VERSION}"
          echo "Released tag: ${TAG}"

      - name: Push changes and tags
        if: steps.check-release.outputs.released == 'true'
        run: |
          git push --follow-tags origin master

      - name: Merge master into develop
        if: steps.check-release.outputs.released == 'true'
        run: |
          git fetch origin develop
          git checkout develop
          git merge --no-ff master -m "Merge branch 'master' into develop"
          git push origin develop

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.extract-version.outputs.tag }}
          name: ${{ steps.extract-version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-image:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
      environment: production
      build_env: prod
    secrets:
      ENV: ${{ secrets.ENV }}
